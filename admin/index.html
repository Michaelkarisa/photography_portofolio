<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Inferno Pictures</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-page">

  <div class="login-card">

    <!-- Brand -->
    <p class="login-logo"><span>Inferno</span> Pictures</p>
    <p class="login-subtitle">Studio Administration Panel</p>

    <h2>Sign in</h2>

    <!-- Error message -->
    <div class="login-error" id="loginError">
      Incorrect email or password. Please try again.
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label for="username">Email</label>
        <input
          type="email"
          id="username"
          name="email"
          placeholder="admin@yourdomain.com"
          autocomplete="email"
          required
        />
      </div>

    <div class="form-group password-group">
  <label for="password">Password</label>

  <div class="password-wrapper">
    <input
      type="password"
      id="password"
      name="password"
      placeholder="••••••••"
      autocomplete="current-password"
      required
    />

    <button type="button" class="password-toggle" onclick="togglePassword()">

      <!-- Eye -->
      <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
        fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2"
          d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3" stroke-width="2"/>
      </svg>

      <!-- Eye Off -->
      <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
        fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none;">
        <path stroke-width="2"
          d="M17.94 17.94A10.94 10.94 0 0112 19C5 19 1 12 1 12
             a21.8 21.8 0 015.17-5.94M9.9 4.24A10.94 10.94 0 0112 5
             c7 0 11 7 11 7a21.8 21.8 0 01-3.17 4.26M1 1l22 22"/>
      </svg>

    </button>
  </div>
</div>

      <button type="submit" class="btn btn--primary">Sign In →</button>

    </form>

    <p style="margin-top:20px; font-size:0.8rem; color:var(--grey-400); text-align:center;">
      Secure login powered by Supabase Auth.<br>
      Contact your administrator to reset your password.
    </p>

  </div>

  <!-- Supabase must load before admin.js so supabaseClient is available -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="admin.js"></script>

  <script>
    /* Redirect to dashboard if a valid session already exists */
    (async () => {
      try {
        const { data: { session } } = await window.supabaseClient.auth.getSession();
        if (session) window.location.href = 'dashboard.html';
      } catch (err) {
        console.warn('[v0] Session check failed:', err);
      }
    })();
  </script>

</body>
</html>
