<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Inferno Pictures</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-page">

  <div class="login-card">

    <!-- Brand -->
    <p class="login-logo"><span>Inferno</span> Pictures</p>
    <p class="login-subtitle">Studio Administration Panel</p>

    <h2>Sign in</h2>

    <!-- Error message -->
    <div class="login-error" id="loginError">
      Incorrect email or password. Please try again.
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label for="username">Email</label>
        <input
          type="email"
          id="username"
          name="email"
          placeholder="admin@yourdomain.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn--primary">Sign In →</button>

    </form>

    <p style="margin-top:20px; font-size:0.8rem; color:var(--grey-400); text-align:center;">
      Secure login powered by Supabase Auth.<br>
      Contact your administrator to reset your password.
    </p>

  </div>

  <!-- Supabase must load before admin.js so supabaseClient is available -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="admin.js"></script>

  <script>
    /* Redirect to dashboard if a valid session already exists */
    (async () => {
      try {
        const { data: { session } } = await window.supabaseClient.auth.getSession();
        if (session) window.location.href = 'dashboard.html';
      } catch (err) {
        console.warn('[v0] Session check failed:', err);
      }
    })();
  </script>

</body>
</html>
